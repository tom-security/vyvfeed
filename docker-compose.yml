services:
  postgres:
    image: postgres:16-alpine
    container_name: vyvfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vyvfeed
      POSTGRES_USER: vyvfeed
      POSTGRES_PASSWORD: vyvfeed
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyvfeed -d vyvfeed"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vyvfeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
